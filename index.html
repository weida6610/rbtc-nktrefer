<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NKT 檢測參考圖</title>
<style>
  :root {
    --teal: #1f3d46;
    --gold: #d9b25a;
    --bg: #f5f4ef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: #222;
  }
  header {
    background: var(--teal);
    color: #fff;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header .subtitle {
    font-size: 13px;
    opacity: 0.75;
  }
  #region-select {
    margin-left: auto;
    padding: 8px 14px;
    font-size: 15px;
    border: 2px solid var(--gold);
    border-radius: 6px;
    background: #fff;
    color: #222;
    cursor: pointer;
    min-width: 200px;
  }
  main {
    max-width: 1100px;
    margin: 20px auto;
    padding: 0 16px 60px;
  }
  .image-container {
    width: 100%;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    line-height: 0;
  }
  .image-container img {
    width: 100%;
    height: auto;
    display: block;
  }
  .text-panel {
    background: #fff;
    border-radius: 8px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-top: 16px;
  }
  .text-panel h2 {
    color: var(--teal);
    margin-top: 0;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 6px;
  }
  .subtitle-line {
    color: #777;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .link-table {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }
  .link-table .cat {
    background: #fafaf7;
    border-left: 4px solid var(--gold);
    padding: 12px 16px;
    border-radius: 4px;
  }
  .link-table .cat h3 {
    color: var(--teal);
    margin: 0 0 8px;
    font-size: 16px;
  }
  .link-table .cat ul {
    margin: 0;
    padding-left: 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  .clinical-notes {
    font-size: 15px;
    line-height: 1.7;
  }
  .problem-group {
    border-left: 4px solid var(--gold);
    padding-left: 14px;
    margin-bottom: 4px;
  }
  .problem-group h3,
  .note-section h3,
  .subsection h4 {
    color: var(--teal);
    margin: 0;
  }
  .problem-group p {
    margin: 4px 0 0;
  }
  .definition-list {
    margin: 4px 0 0;
    padding-left: 18px;
  }
  .definition-list li {
    margin-top: 2px;
  }
  .note-section {
    border-top: 1px solid #eee;
    padding: 16px 0;
  }
  .note-section h3 {
    font-size: 17px;
    margin-bottom: 6px;
  }
  .detail-row {
    display: flex;
    gap: 4px;
    align-items: baseline;
    margin-top: 2px;
  }
  .detail-label {
    color: var(--teal);
    font-weight: 700;
    flex-shrink: 0;
  }
  .detail-value {
    color: #444;
  }
  .subsections {
    margin-top: 10px;
  }
  .subsection {
    border-left: 2px solid #e5d4a2;
    padding: 8px 0 8px 12px;
    margin-top: 8px;
  }
  .subsection h4 {
    font-size: 15px;
    margin-bottom: 4px;
  }
  @media (max-width: 640px) {
    .detail-row {
      display: block;
    }
  }
  .sub-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .sub-list li {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
  }
  .sub-list li:last-child { border-bottom: none; }
  .sub-list .num {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    background: var(--gold);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
  }
  .sub-list .body .zh-name {
    font-weight: 700;
    font-size: 16px;
    color: var(--teal);
  }
  .sub-list .body .en-name {
    font-size: 13px;
    color: #888;
    margin-left: 8px;
  }
  .sub-list .body .desc {
    font-size: 14px;
    color: #555;
    margin-top: 4px;
    line-height: 1.5;
  }
  footer {
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: 12px;
  }
</style>
</head>
<body>
<header>
  <h1>NKT 檢測參考圖</h1>
  <span class="subtitle">韌帶・肌肉分布</span>
  <select id="region-select"></select>
</header>
<main>
  <div class="image-container" id="img-container">
    <img id="anatomy-img" alt="">
  </div>
  <div class="text-panel" id="text-panel" style="display:none"></div>
</main>
<footer>© 狂牛體能訓練中心 · 教練內部參考</footer>

<script>
const REGIONS = [
  {
    id: 'ankle',
    name: '踝關節韌帶',
    image: 'photos/Ankle Ligament.png',
    extraPanel: {
      title: '三角韌帶（Deltoid ligament）細分',
      subtitle: '內側三角韌帶由以下四束組成，共同穩定踝內側',
      items: [
        { no: '①', zh: '前脛距韌帶', en: 'Anterior tibiotalar ligament', desc: '由脛骨內踝前緣 → 距骨內側前方，限制距骨外移/外翻' },
        { no: '②', zh: '後脛距韌帶', en: 'Posterior tibiotalar ligament', desc: '由脛骨內踝後緣 → 距骨內側後突，限制距骨後移/外翻' },
        { no: '③', zh: '脛跟韌帶', en: 'Tibiocalcaneal ligament', desc: '由脛骨內踝 → 跟骨載距突，限制足跟外翻' },
        { no: '④', zh: '脛舟韌帶', en: 'Tibionavicular ligament', desc: '由脛骨內踝前緣 → 舟狀骨內側，支撐內側縱弓' }
      ]
    }
  },
  {
    id: 'ankle-link',
    name: '踝韌帶－肌肉對應表',
    image: null,
    textContent: {
      type: 'clinical-notes',
      title: '踝韌帶與相關肌肉對應',
      sections: [
        {
          marker: 'a.',
          title: 'ATFL前距腓韌帶',
          details: [
            { label: '位置', value: '腓骨往前連接距骨' },
            { label: '影響', value: '腓骨' },
            { label: '作用肌肉', value: 'PL/B、PT、 同側頸屈肌(例A.Scalene)' }
          ]
        },
        {
          marker: 'b.',
          title: 'PTFL後距腓韌帶',
          details: [
            { label: '位置', value: '腓骨往後連接距骨' },
            { label: '影響', value: '腓骨、距骨' },
            { label: '作用肌肉', value: 'PL/B、PT、 同側頸伸肌(例SC)' }
          ]
        },
        {
          marker: 'c.',
          title: 'CF跟腓韌帶',
          details: [
            { label: '位置', value: '腓骨外側正下朝向腳跟方向' },
            { label: '影響', value: '腓骨、跟骨' },
            { label: '作用肌肉', value: '小腿外側、腿後系列' }
          ]
        },
        {
          marker: 'd.',
          title: 'Deltoid三角韌帶',
          details: [
            { label: '位置', value: '脛骨—距骨、脛骨—跟骨之三角地帶 (前後脛距韌帶)' },
            { label: '影響', value: '距骨、跟骨、舟狀骨(中足)' },
            { label: '作用肌肉', value: 'TP、屈趾長肌、 同側股四頭肌、肩胛下肌、U.Trap' }
          ]
        },
        {
          marker: 'e.',
          title: '伸肌支持帶',
          details: [
            { label: '位置', value: '脛骨往那前側整圈腳踝前側' },
            { label: '影響', value: '距骨' },
            { label: '作用肌肉', value: 'TA、TP' }
          ]
        },
        {
          marker: 'f.',
          title: '屈肌支持帶',
          details: [
            { label: '位置', value: '內踝往腳跟方向一片' },
            { label: '影響', value: '脛骨' },
            { label: '作用肌肉', value: 'TA、TP、屈趾長肌' }
          ]
        }
      ]
    }
  },
  {
    id: 'hip-anterior',
    name: '髖關節韌帶（前側）',
    image: 'photos/Hip Ligament Anterior.png'
  },
  {
    id: 'hip-posterior',
    name: '髖關節韌帶（後側）',
    image: 'photos/Hip Ligament Posterior.png'
  },
  {
    id: 'hip-link',
    name: '髖韌帶—肌肉對應表',
    image: null,
    textContent: {
      type: 'clinical-notes',
      title: '髖部韌帶與相關肌肉對應',
      problemTitle: '常見問題',
      problems: '慣性髖緊卡、有壓迫、曾跌坐、喜翹腳、產後、骨盆核心障礙、下背痛、長短腿、步態問題',
      sections: [
        {
          marker: 'a.',
          title: '髂腰韌帶(IL)',
          details: [
            { label: '常見配對', value: '左右IL互相代償、同側SI to 同側腹股溝韌帶' },
            { label: '位置', value: '髂骨—腰椎' },
            { label: '作用肌肉', value: '同側QL、ES、Multifidus' },
            { label: '常見症狀', value: '骨盆三平面翻轉' }
          ]
        },
        {
          marker: 'b.',
          title: '薦髂韌帶(SI)',
          details: [
            { label: '常見配對', value: '左右SI互相代償' }
          ],
          subsections: [
            {
              title: '上1/3',
              details: [
                { label: '作用肌肉', value: 'Gmax、Gmed、ES、QL' },
                { label: '常見症狀', value: '薦椎上1/3前旋轉' }
              ]
            },
            {
              title: '中1/3',
              details: [
                { label: '作用肌肉', value: 'Piriformis' },
                { label: '常見症狀', value: '薦椎中1/3有左或右側翻轉，及坐骨神經問題' }
              ]
            },
            {
              title: '下1/3',
              details: [
                { label: '作用肌肉', value: '腿後、股方肌' },
                { label: '常見症狀', value: '薦椎下1/3往前旋轉，及坐骨神經問題' }
              ]
            }
          ]
        },
        {
          marker: 'c.',
          title: '骶結韌帶(ST)',
          details: [
            { label: '常見配對', value: '同側ST to 對側SS' },
            { label: '位置', value: '坐骨粗隆往內上方連接薦椎' },
            { label: '作用肌肉', value: '腿後、股方肌' }
          ]
        },
        {
          marker: 'd.',
          title: '薦棘韌帶(SS)',
          details: [
            { label: '位置', value: 'ST之1/2往外＋往上一點點處' },
            { label: '作用肌肉', value: 'OI、骨盆底肌' },
            { label: '常見症狀', value: '骨盆底肌功能失常(漏尿)' }
          ]
        }
      ]
    }
  },
  {
    id: 'hyoid',
    name: '舌骨肌群',
    image: 'photos/Hyoid Muscles.png'
  },
  {
    id: 'eye',
    name: '眼部肌肉',
    image: 'photos/Eye Muscle.png'
  },
  {
    id: 'shoulder',
    name: '肩部韌帶',
    image: 'photos/Shoulder Ligament.png'
  },
  {
    id: 'shoulder-link',
    name: '肩韌帶－肌肉對應表',
    image: null,
    textContent: {
      type: 'clinical-notes',
      title: '肩韌帶與相關肌肉對應',
      definitionTitle: '定義位置',
      definitions: [
        '喙突：肱骨頭內緣深層凸點',
        '肩峰：肩外側凸點'
      ],
      sections: [
        {
          marker: 'a.',
          title: '鎖間韌帶(TranseverseC)',
          details: [
            { label: '位置', value: '雙側鎖骨之間' },
            { label: '影響', value: '肩胛骨' },
            { label: '作用肌肉', value: '三角肌' }
          ]
        },
        {
          marker: 'b.',
          title: '胸鎖韌帶(SC)',
          details: [
            { label: '常見配對', value: '同側AC to 對側SC' },
            { label: '位置', value: '鎖骨—胸骨' },
            { label: '影響', value: '鎖骨與肩胛骨' },
            { label: '作用肌肉', value: '三角肌、外展相關、上舉相關' }
          ]
        },
        {
          marker: 'c.',
          title: '喙鎖韌帶(CC)',
          details: [
            { label: '位置', value: '鎖骨外側1/3—喙突' },
            { label: '影響', value: '鎖骨' },
            { label: '作用肌肉', value: 'SCM、鎖骨下肌、胸大肌、三角肌' }
          ]
        },
        {
          marker: 'd.',
          title: '喙肩韌帶(CA)',
          details: [
            { label: '位置', value: '喙突往外往上連到肩峰' },
            { label: '影響', value: '肱骨' },
            { label: '作用肌肉', value: '闊背肌、棘上肌' }
          ]
        },
        {
          marker: 'e.',
          title: '肩鎖韌帶(AC)',
          details: [
            { label: '位置', value: '肩胛棘—鎖骨，與盂肱關節和旋轉肌有關' },
            { label: '影響', value: '肱骨' },
            { label: '作用肌肉', value: '三角肌、旋轉肌群 (棘上肌、棘下肌、肩胛下肌、小圓肌)' }
          ]
        },
        {
          marker: 'f.',
          title: '喙肱韌帶(CH)',
          details: [
            { label: '位置', value: '喙突往前連到肱骨頭' },
            { label: '影響', value: '肩胛骨' },
            { label: '作用肌肉', value: '菱形肌、上斜方肌、水平外展相關' }
          ]
        },
        {
          marker: 'g.',
          title: '盂肱韌帶(GH)',
          details: [
            { label: '位置', value: '前三角肌和胸肌的交界(前肩到胸整排)' },
            { label: '影響', value: '肱骨' },
            { label: '作用肌肉', value: '前關節囊、上斜方肌、中斜方肌、下斜方肌、肩外轉相關(棘下肌、大圓肌、小圓肌)' }
          ]
        },
        {
          marker: 'h.',
          title: '後關節囊(P.Capsule)',
          details: [
            { label: '常見配對', value: '前後關節囊互相代償' },
            { label: '位置', value: '手臂與身體之直角交界處' },
            { label: '影響', value: '肱骨' },
            { label: '常見症狀', value: '肱骨加/減壓問題' }
          ]
        }
      ]
    }
  }
];

const select = document.getElementById('region-select');
const imgEl = document.getElementById('anatomy-img');
const container = document.getElementById('img-container');
const textPanel = document.getElementById('text-panel');

REGIONS.forEach(r => {
  const opt = document.createElement('option');
  opt.value = r.id;
  opt.textContent = r.name;
  select.appendChild(opt);
});

function renderTextPanel(content) {
  if (!content) {
    textPanel.style.display = 'none';
    return;
  }
  textPanel.style.display = 'block';
  let html = '<h2>' + content.title + '</h2>';
  if (content.subtitle) {
    html += '<div class="subtitle-line">' + content.subtitle + '</div>';
  }
  if (content.type === 'link-table') {
    html += '<div class="link-table">';
    content.groups.forEach(g => {
      html += '<div class="cat"><h3>' + g.name + '</h3><ul>';
      g.items.forEach(it => { html += '<li>' + it + '</li>'; });
      html += '</ul></div>';
    });
    html += '</div>';
  } else if (content.type === 'clinical-notes') {
    html += '<div class="clinical-notes">';
    if (content.problemTitle) {
      html += '<div class="problem-group"><h3>' + content.problemTitle + '</h3><p>' + content.problems + '</p></div>';
    }
    if (content.definitionTitle) {
      html += '<div class="problem-group"><h3>' + content.definitionTitle + '</h3><ul class="definition-list">';
      content.definitions.forEach(definition => {
        html += '<li>' + definition + '</li>';
      });
      html += '</ul></div>';
    }
    content.sections.forEach(section => {
      html += '<section class="note-section"><h3>' + section.marker + ' ' + section.title + '</h3>';
      if (section.details) {
        section.details.forEach(detail => {
          html += '<div class="detail-row"><span class="detail-label">' + detail.label + '：</span><span class="detail-value">' + detail.value + '</span></div>';
        });
      }
      if (section.subsections) {
        html += '<div class="subsections">';
        section.subsections.forEach(subsection => {
          html += '<div class="subsection"><h4>' + subsection.title + '</h4>';
          subsection.details.forEach(detail => {
            html += '<div class="detail-row"><span class="detail-label">' + detail.label + '：</span><span class="detail-value">' + detail.value + '</span></div>';
          });
          html += '</div>';
        });
        html += '</div>';
      }
      html += '</section>';
    });
    html += '</div>';
  } else if (content.items) {
    html += '<ul class="sub-list">';
    content.items.forEach(it => {
      html += '<li><div class="num">' + it.no + '</div><div class="body">';
      html += '<span class="zh-name">' + it.zh + '</span><span class="en-name">' + it.en + '</span>';
      if (it.desc) html += '<div class="desc">' + it.desc + '</div>';
      html += '</div></li>';
    });
    html += '</ul>';
  }
  textPanel.innerHTML = html;
}

function render(regionId) {
  const region = REGIONS.find(r => r.id === regionId);
  if (!region) return;

  if (region.image) {
    container.style.display = '';
    imgEl.src = region.image;
    imgEl.alt = region.name;
  } else {
    container.style.display = 'none';
  }

  renderTextPanel(region.textContent || region.extraPanel);
}

select.addEventListener('change', e => render(e.target.value));

const initialRegionId = window.location.hash.slice(1);
const initialRegion = REGIONS.some(r => r.id === initialRegionId) ? initialRegionId : REGIONS[0].id;
select.value = initialRegion;
render(initialRegion);
</script>
</body>
</html>
